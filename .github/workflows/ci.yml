name: CI Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      gists: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        id: gradle_build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: Upload log as Gist on failure
        if: steps.gradle_build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # extract last 300 lines — the important part
          TAIL=$(tail -300 /tmp/build.log)
          # create gist via API
          PAYLOAD=$(jq -n \
            --arg desc "Build failure on ${{ github.sha }}" \
            --arg content "$TAIL" \
            '{description: $desc, public: false, files: {"build-error.txt": {content: $content}}}')
          GIST_URL=$(curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/gists \
            -d "$PAYLOAD" | jq -r '.id')
          echo "GIST_ID=$GIST_URL" >> $GITHUB_ENV
          echo "::error::Build failed. Gist ID: $GIST_URL"

      - name: Fail if build failed
        if: steps.gradle_build.outcome == 'failure'
        run: exit 1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: steps.gradle_build.outcome == 'success'
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest --continue --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: '**/build/reports/tests/'

  release-build:
    name: Release Build (All ABIs)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Setup CI keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -keystore ~/.android/ci.keystore \
            -storepass android -alias cikey -keypass android \
            -keyalg RSA -keysize 2048 -validity 365 \
            -dname "CN=CI,O=NetGuard,C=US" -noprompt 2>/dev/null
      - name: Build Release APKs (Universal + arm64 + arm32 + x86_64 + x86)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/ci.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=cikey \
            -Pandroid.injected.signing.key.password=android
      - name: Build AAB
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/ci.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=cikey \
            -Pandroid.injected.signing.key.password=android
      - name: List APKs
        run: |
          echo "=== Release APKs ===" && find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;
          echo "=== AAB ===" && find app/build/outputs/bundle/release -name "*.aab" -exec ls -lh {} \;
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 30
