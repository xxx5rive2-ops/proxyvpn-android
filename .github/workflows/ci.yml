name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/build.log ; exit ${PIPESTATUS[0]}

      - name: Post log to GitHub Release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract key lines from log
          python3 - << 'PYEOF'
import subprocess, json, urllib.request, os, sys

log = open('/tmp/build.log').read()
lines = log.splitlines()

# Find error section
error_idx = next((i for i,l in enumerate(lines)
    if any(k in l for k in ['error:', 'FAILURE:', 'Exception', 'BUILD FAILED'])), None)

if error_idx is not None:
    snippet = '\n'.join(lines[max(0,error_idx-3):error_idx+60])
else:
    snippet = '\n'.join(lines[-80:])

tag = 'build-log-${{ github.run_number }}'
body = f'Build log Run #${{ github.run_number }}\n\n```\n{snippet[:60000]}\n```'

# Create release with log embedded
payload = json.dumps({
    'tag_name': tag,
    'name': f'Build Log #${{ github.run_number }}',
    'body': body,
    'draft': True,
    'prerelease': True
}).encode()

req = urllib.request.Request(
    'https://api.github.com/repos/${{ github.repository }}/releases',
    data=payload,
    headers={
        'Authorization': f'token {os.environ["GH_TOKEN"]}',
        'Content-Type': 'application/json'
    }
)
try:
    resp = urllib.request.urlopen(req)
    d = json.loads(resp.read())
    print(f'Release created: {d.get("id")} tag={d.get("tag_name")}')
except Exception as e:
    print(f'Failed: {e}')
PYEOF

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest --continue

  release-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Setup CI keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -keystore ~/.android/ci.keystore \
            -storepass android -alias cikey -keypass android \
            -keyalg RSA -keysize 2048 -validity 365 \
            -dname "CN=CI,O=NetGuard,C=US" -noprompt 2>/dev/null
      - name: Build Release APKs
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/ci.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=cikey \
            -Pandroid.injected.signing.key.password=android
      - name: Build AAB
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/ci.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=cikey \
            -Pandroid.injected.signing.key.password=android
      - name: List outputs
        run: |
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;
          find app/build/outputs/bundle/release -name "*.aab" -exec ls -lh {} \;
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 30
