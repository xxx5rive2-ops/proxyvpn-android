name: CI Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        id: build
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle_out.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^(FAILURE|error:|Error|Exception|> Task|Could not|Unresolved|BUILD FAILED|what went wrong|Try:)" /tmp/gradle_out.txt | head -60 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "### Full error context" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 /tmp/gradle_out.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Build Succeeded" >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT_CODE

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --continue --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.sha }}
          path: '**/build/reports/tests/'

  release-build:
    name: Release Build (All ABIs)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Setup CI keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -keystore ~/.android/ci.keystore \
            -storepass android -alias cikey -keypass android \
            -keyalg RSA -keysize 2048 -validity 365 \
            -dname "CN=CI,O=NetGuard,C=US" -noprompt 2>/dev/null
      - name: Build Release APKs (Universal + per-ABI)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/ci.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=cikey \
            -Pandroid.injected.signing.key.password=android \
            --stacktrace
      - name: Build AAB
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/ci.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=cikey \
            -Pandroid.injected.signing.key.password=android
      - name: Show artifacts
        run: |
          echo "=== APKs ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo "=== AAB ==="
          find app/build/outputs/bundle -name "*.aab" -exec ls -lh {} \;
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 30
